explanation = "Hallucinations are outputs that sound confident and plausible but are factually incorrect or entirely fabricated. This is a key challenge with LLMs. RAG and grounding help mitigate this."

[answers.Q28]
correct = ["B"]
explanation = "RAG retrieves relevant information from external knowledge sources (documents, databases) and includes it in the prompt context. This grounds the model's response in factual data, reducing hallucinations."

