# Answer key for AWS DVA-C02 Practice Exam

[answers.Q1]
correct = ["B"]
explanation = "Lambda supports a maximum timeout of 900 seconds (15 minutes). Setting it to 600 seconds (10 minutes) handles the requirement. Default timeout is only 3 seconds."

[answers.Q2]
correct = ["C"]
explanation = "ElastiCache for Redis supports TTL on individual keys and provides sub-millisecond latency. DynamoDB with TTL is also valid but TTL deletion is not guaranteed to be immediate (can take up to 48 hours). ElastiCache TTL is exact."

[answers.Q3]
correct = ["B"]
explanation = "600 items/min = 10 items/sec. Each item is 5 KB, which rounds up to 5 WCU per item (1 WCU = 1 KB). 10 × 5 = 50 WCU."

[answers.Q4]
correct = ["B"]
explanation = "Exponential backoff with jitter is the AWS-recommended retry strategy for throttling errors. The AWS SDK implements this automatically, but custom implementations should follow this pattern."

[answers.Q5]
correct = ["C"]
explanation = "BatchGetItem retrieves multiple items by primary key in a single call (up to 100 items or 16 MB). Query requires a single partition key. Scan reads the entire table."

[answers.Q6]
correct = ["C"]
explanation = "SQS guarantees at-least-once delivery, meaning duplicates are possible. The developer must implement idempotency (e.g., tracking processed message IDs in DynamoDB) to handle this."

[answers.Q7]
correct = ["B"]
explanation = "SNS fan-out pattern: publish to an SNS topic that has multiple SQS queues subscribed. Each queue receives a copy of the message. This is the standard fan-out architecture."

[answers.Q8]
correct = ["B"]
explanation = "13 KB rounds up to 4 RCU per item (each RCU covers 4 KB for strongly consistent). 25 × 4 = 100 RCU for strongly consistent. Eventually consistent reads get 2 reads per RCU, so 100 / 2 = 50 RCU."

[answers.Q9]
correct = ["B"]
explanation = "API Gateway request validators can validate the request body against a JSON schema model and check required parameters before the Lambda function is invoked, saving compute costs."

[answers.Q10]
correct = ["B"]
explanation = "DynamoDB Streams captures item-level changes (insert, update, delete) and can trigger a Lambda function to process changes in near real-time, such as updating a search index."

[answers.Q11]
correct = ["B"]
explanation = "RDS Proxy pools and shares database connections, solving the connection exhaustion problem that occurs when many Lambda invocations each open their own connection."

[answers.Q12]
correct = ["B"]
explanation = "FIFO queues guarantee ordering and exactly-once processing. Content-based deduplication uses a SHA-256 hash of the message body to prevent duplicates within the 5-minute deduplication interval."

[answers.Q13]
correct = ["B"]
explanation = "With Lambda proxy integration, the Lambda function must return an object with statusCode (number), headers (object), and body (string). API Gateway passes this directly to the client."

[answers.Q14]
correct = ["A"]
explanation = "S3 Standard is designed for frequently accessed data with low latency. DynamoDB has a 400 KB item limit. S3 supports objects up to 5 TB and is more cost-effective for large objects."

[answers.Q15]
correct = ["B"]
explanation = "The visibility timeout makes a message invisible to other consumers while it is being processed. Default is 30 seconds. If processing takes longer, the consumer should call ChangeMessageVisibility."

[answers.Q16]
correct = ["B"]
explanation = "Writing back to the same bucket triggers another S3 event, which invokes the Lambda again, creating an infinite loop. Use a prefix/suffix filter on the event notification or write to a different bucket."

[answers.Q17]
correct = ["C"]
explanation = "AWS AppSync is a managed GraphQL service that natively supports real-time subscriptions via WebSockets, offline data sync, and integration with DynamoDB, Lambda, and other data sources."

[answers.Q18]
correct = ["B"]
explanation = "8 KB rounds up to 2 RCU per item (each RCU covers 4 KB). 10 items/sec × 2 RCU = 20 RCU for strongly consistent reads."

[answers.Q19]
correct = ["B"]
explanation = "Step Functions orchestrates multi-step workflows with built-in support for human approval tasks (callback pattern), error handling, retries, and parallel execution."

[answers.Q20]
correct = ["B"]
explanation = "Lambda destinations allow you to route asynchronous invocation results (success or failure) to SQS, SNS, Lambda, or EventBridge. An on-failure destination captures the event payload and error details."

[answers.Q21]
correct = ["B"]
explanation = "Optimistic locking uses a version attribute. The conditional write checks that the version hasn't changed since the read. If it has, the write fails and the application retries. This prevents lost updates without locking."

[answers.Q22]
correct = ["B"]
explanation = "Amazon API Gateway supports WebSocket APIs for persistent bidirectional connections. ALB supports WebSocket passthrough but doesn't manage the WebSocket protocol itself."

[answers.Q23]
correct = ["B"]
explanation = "Parallel Scan divides the table into segments and scans them concurrently, significantly improving throughput for large tables. BatchGetItem requires knowing all primary keys upfront."

[answers.Q24]
correct = ["B"]
explanation = "Lambda functions in a VPC private subnet need a NAT gateway to reach the internet. Without it, outbound internet calls time out. Alternatively, remove the function from the VPC if it doesn't need VPC resources."

[answers.Q25]
correct = ["B"]
explanation = "By default, Lambda processes each Kinesis shard with one concurrent invocation. With 4 shards, there are 4 concurrent invocations. The parallelization factor (up to 10) can increase this to 40."

[answers.Q26]
correct = ["B"]
explanation = "API Gateway stage-level caching stores responses for a configurable TTL, reducing backend invocations. CloudFront also works but API Gateway caching is more tightly integrated."

[answers.Q27]
correct = ["B"]
explanation = "Pre-signed URLs grant temporary, time-limited permission to upload directly to S3. The application generates the URL server-side and the client uploads directly, avoiding server bandwidth costs."

[answers.Q28]
correct = ["B"]
explanation = "Bisect batch on function error splits the failed batch in half and retries each half, isolating the bad record. This prevents a single poison pill message from blocking the entire shard."

[answers.Q29]
correct = ["B"]
explanation = "Parameter Store is designed for configuration data. It's free for standard parameters, supports hierarchies, and integrates with Lambda. Secrets Manager is for secrets that need rotation, which is overkill for config values."

[answers.Q30]
correct = ["C"]
explanation = "EventBridge provides event-driven architecture with content-based filtering rules, schema discovery, and integration with 20+ AWS services. SNS with filtering also works but EventBridge offers richer filtering and more targets."

[answers.Q31]
correct = ["C"]
explanation = "TransactWriteItems provides ACID transactions across multiple tables (up to 100 items). If any operation fails, the entire transaction is rolled back. BatchWriteItem does NOT support transactions."

[answers.Q32]
correct = ["D"]
explanation = "Placing initialization outside the handler reuses the connection pool across warm invocations (execution context reuse). Provisioned concurrency keeps instances warm, eliminating cold starts entirely. Both together give the best result."

[answers.Q33]
correct = ["B"]
explanation = "Secrets Manager is purpose-built for credential storage with automatic rotation via Lambda. Parameter Store SecureString can store secrets but doesn't have built-in automatic rotation for database credentials."

[answers.Q34]
correct = ["C"]
explanation = "An IAM execution role attached to the Lambda function provides temporary credentials automatically. The role should have only the specific S3 read and DynamoDB write permissions needed (least privilege)."

[answers.Q35]
correct = ["B"]
explanation = "Cognito identity pools (federated identities) exchange tokens from social providers for temporary AWS credentials via STS. User pools handle authentication; identity pools handle authorization to AWS resources."

[answers.Q36]
correct = ["B"]
explanation = "API Gateway has a built-in Cognito user pool authorizer that validates JWT tokens directly without custom code. A Lambda authorizer works but requires writing and maintaining custom validation logic."

[answers.Q37]
correct = ["D"]
explanation = "Client-side encryption means the data is encrypted before it reaches AWS. SSE-S3, SSE-KMS, and SSE-C are all server-side encryption options where S3 performs the encryption."

[answers.Q38]
correct = ["B"]
explanation = "KMS Encrypt has a 4 KB payload limit. For larger data, use envelope encryption: GenerateDataKey returns a plaintext and encrypted data key. Encrypt data locally with the plaintext key, then store the encrypted data key alongside the ciphertext."

[answers.Q39]
correct = ["B"]
explanation = "A cross-account IAM role with STS AssumeRole provides temporary, scoped credentials. Pre-signed URLs work for individual objects but don't provide general bucket access."

[answers.Q40]
correct = ["D"]
explanation = "Both approaches are valid. Lambda encrypts environment variables at rest by default, but using a customer KMS key with in-function decryption adds an extra layer. Secrets Manager is the preferred approach for sensitive credentials."

[answers.Q41]
correct = ["D"]
explanation = "DynamoDB fine-grained access control uses IAM policy conditions on dynamodb:LeadingKeys to restrict access based on the partition key value, ensuring users can only access items matching their tenant_id."

[answers.Q42]
correct = ["C"]
explanation = "IAM instance profiles (roles) provide temporary credentials via the instance metadata service. No long-lived keys to manage, rotate, or risk leaking. This is the AWS best practice for EC2."

[answers.Q43]
correct = ["B"]
explanation = "AWS Signature Version 4 (SigV4) is the signing process for authenticating AWS API requests. It uses HMAC-SHA256 to sign the request with your secret access key, date, region, and service."

[answers.Q44]
correct = ["B"]
explanation = "The pre-token generation Lambda trigger fires before Cognito issues tokens, allowing you to add, modify, or suppress claims in the ID token and access token."

[answers.Q45]
correct = ["A"]
explanation = "A private API Gateway with a resource policy restricting access to a specific VPC endpoint ensures only traffic from that VPC can reach the API."

[answers.Q46]
correct = ["B"]
explanation = "SecureString parameters are encrypted using AWS KMS. You can use the default AWS-managed key or specify a customer-managed CMK."

[answers.Q47]
correct = ["A"]
explanation = "A bucket policy with Deny effect and condition 'aws:SecureTransport': 'false' rejects any request not made over HTTPS. Default encryption only encrypts at rest, not in transit."

[answers.Q48]
correct = ["D"]
