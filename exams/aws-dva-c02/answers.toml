[answers.Q49]
correct = ["B"]
explanation = "Cross-account access uses an IAM role in Account B that trusts Account A. The Lambda function calls STS AssumeRole to get temporary credentials for Account B's DynamoDB table."

[answers.Q50]
correct = ["A"]
explanation = "STS temporary credentials consist of an access key ID, a secret access key, and a session token. All three must be included in API requests made with temporary credentials."

[answers.Q51]
correct = ["B"]
explanation = "A bucket policy condition on s3:x-amz-server-side-encryption-aws-kms-key-id denies uploads that don't use the specified KMS key. Default encryption is a fallback, not an enforcement mechanism."

[answers.Q52]
correct = ["B"]
explanation = "Usage plans with API keys allow per-client throttling and quota limits. Lambda reserved concurrency limits function-level concurrency, not per-client request rates."

[answers.Q53]
correct = ["C"]
explanation = "For proxy integrations, API Gateway does not modify the response. CORS headers must be returned by the Lambda function in the response headers. The API Gateway CORS configuration handles the OPTIONS preflight request."

